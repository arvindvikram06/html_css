<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid layout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Grid Layout with 3 columns</h1>
    </header>
    <main>
        <!-- grid-container-part starts -->
        <div class="container">
            <div class="grid-item">Grid-1</div>
            <div class="grid-item">Grid-2</div>
            <div class="grid-item">Grid-3</div>
            <div class="grid-item">Grid-4</div>
            <div class="grid-item">Grid-5</div>
            <div class="grid-item">Grid-6</div>
            <div class="grid-item">Grid-7</div>
            <div class="grid-item">Grid-8</div>
            <div class="grid-item">Grid-9</div>
        </div>
        <!-- grid-container-part ends -->
    </main>
</body>
</html>
