<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./style.css"/>
</head>
<body>
       <header>
            <h1>Pure CSS Carousel</h1>
       </header>
       
       <main>
          <div class="carousel">

            <!-- hidden-radio-btn -->
            <input type="radio" id="image1" name="radiobuttons"  checked/>
            <input type="radio" id="image2" name="radiobuttons"  />
            <input type="radio" id="image3" name="radiobuttons"  />
            <input type="radio" id="image4" name="radiobuttons"  />
            <input type="radio" id="image5" name="radiobuttons"  />
            <input type="radio" id="image6" name="radiobuttons"  />
           
            <!-- carousel-container -->
            <div class="carousel-box">
               <div class="slide">
                    <img src="./assets/car1.png"/>
               </div>
               <div class="slide">
                    <img src="./assets/car2.png" />
               </div>
               <div class="slide">
                    <img src="./assets/car3.png" />
               </div>
               <div class="slide">
                    <img src="./assets/car4.png" />
               </div>
               <div class="slide">
                    <img src="./assets/car5.png" />
               </div>
               <div class="slide">
                    <img src="./assets/car6.png" />
               </div>
           </div>
           
           <!-- buttons -->
           <div class="navigation-btn">
            <label class="btn-1" for="image1"></label>
            <label class="btn-2" for="image2"></label>
            <label class="btn-3" for="image3"></label>
            <label class="btn-4" for="image4"></label>
            <label class="btn-5" for="image5"></label>
            <label class="btn-6" for="image6"></label>
          </div>
          </div>
       </main>

</body>
</html>
